<div class="forgot-wrapper flex-center">
  <div class="card forgot-card">
    <div class="text-center mb-4">
      <h1 class="gradient-text logo-title">Recover Password</h1>
      <p class="subtitle mt-1">Verification and Reset Portal</p>
    </div>
    
    <div class="error-alert" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/>
      </svg>
      <span>{{ successMessage }}</span>
    </div>
    
    <!-- Step 1: Request Security Question -->
    <div *ngIf="step === 1">
      <form (ngSubmit)="onRetrieveQuestion()" #step1Form="ngForm">
        <div class="form-group">
          <label class="form-label" for="email">Enter Registered Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-control" 
            placeholder="your-email@sts.com" 
            [(ngModel)]="email" 
            required 
            email
            #emailInput="ngModel"
          >
          <span class="field-error" *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)">
            Please enter a valid email address.
          </span>
        </div>
        
        <button type="submit" class="btn btn-primary w-100" [disabled]="step1Form.invalid || isLoading">
          <span *ngIf="!isLoading">Retrieve Security Question</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </form>
    </div>
    
    <!-- Step 2: Answer question and Reset Password -->
    <div *ngIf="step === 2">
      <div class="question-container card mb-3">
        <p class="question-label">Security Question:</p>
        <p class="question-text text-info">"{{ securityQuestion }}"</p>
      </div>
      
      <form (ngSubmit)="onSubmitReset()" #step2Form="ngForm">
        <div class="form-group">
          <label class="form-label" for="securityAnswer">Your Answer</label>
          <input 
            type="text" 
            id="securityAnswer" 
            name="securityAnswer" 
            class="form-control" 
            placeholder="Security answer (case insensitive)" 
            [(ngModel)]="securityAnswer" 
            required
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <input 
            type="password" 
            id="newPassword" 
            name="newPassword" 
            class="form-control" 
            placeholder="Min 6 characters" 
            [(ngModel)]="newPassword" 
            required
            minlength="6"
            #passInput="ngModel"
          >
          <span class="field-error" *ngIf="passInput.invalid && (passInput.dirty || passInput.touched)">
            Password must be at least 6 characters.
          </span>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm New Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            class="form-control" 
            placeholder="Repeat new password" 
            [(ngModel)]="confirmPassword" 
            required
          >
        </div>
        
        <div class="flex-between gap-1 mt-4">
          <button type="button" class="btn btn-secondary w-50" (click)="onBackToStep1()">
            Back
          </button>
          <button type="submit" class="btn btn-accent w-50" [disabled]="step2Form.invalid || isLoading">
            <span *ngIf="!isLoading">Reset Password</span>
            <span *ngIf="isLoading" class="spinner"></span>
          </button>
        </div>
      </form>
    </div>
    
    <div class="text-center mt-4">
      <a routerLink="/login" class="login-link">Back to Sign In</a>
    </div>
  </div>
</div>
