<div class="login-wrapper flex-center">
  <div class="card login-card">
    <div class="text-center mb-4">
      <h1 class="logo-title">Reset Password</h1>
      <p class="subtitle mt-1">Recover your SwiftLink Portal account</p>
    </div>
    
    <div class="error-alert" *ngIf="errorMessage">
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <span>{{ successMessage }}</span>
    </div>
    
    <!-- Step 1: Collect Email -->
    <form *ngIf="step === 1" (ngSubmit)="onRetrieveQuestion()">
      <div class="form-group">
        <label class="form-label" for="email">Enter Registered Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="name@email.com" 
          [(ngModel)]="email" 
          required
        >
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="!email || isLoading">
        <span *ngIf="!isLoading">Find Question</span>
        <span *ngIf="isLoading">Verifying...</span>
      </button>
      
      <div class="text-center mt-3">
        <a routerLink="/login" class="register-link">Back to Sign In</a>
      </div>
    </form>
    
    <!-- Step 2: Answer Question & Set New Password -->
    <form *ngIf="step === 2" (ngSubmit)="onSubmitReset()">
      <div class="card" style="padding: 1rem; margin-bottom: 1rem; border-color: var(--info);">
        <strong>Security Question:</strong>
        <p style="margin-top: 0.25rem;">{{ securityQuestion }}</p>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="securityAnswer">Your Answer</label>
        <input 
          type="text" 
          id="securityAnswer" 
          name="securityAnswer" 
          class="form-control" 
          placeholder="Answer" 
          [(ngModel)]="securityAnswer" 
          required
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input 
          type="password" 
          id="newPassword" 
          name="newPassword" 
          class="form-control" 
          placeholder="Min 6 characters" 
          [(ngModel)]="newPassword" 
          required
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          class="form-control" 
          placeholder="Repeat password" 
          [(ngModel)]="confirmPassword" 
          required
        >
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="!securityAnswer || !newPassword || !confirmPassword || isLoading">
        <span *ngIf="!isLoading">Reset Password</span>
        <span *ngIf="isLoading">Updating...</span>
      </button>
      
      <div class="flex-between mt-3">
        <button type="button" class="btn btn-secondary" (click)="onBackToStep1()">Back</button>
        <a routerLink="/login" class="register-link">Sign In</a>
      </div>
    </form>
  </div>
</div>
