<nav class="navbar" *ngIf="isLoggedIn">
  <div class="nav-container">
    <a class="nav-logo" routerLink="/">
      SwiftLink <span class="subtitle">STS</span>
    </a>
    
    <ul class="nav-menu">
      <!-- User Links -->
      <li class="nav-item" *ngIf="userRole === 'USER'">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">My Tickets</a>
      </li>
      <li class="nav-item" *ngIf="userRole === 'USER'">
        <a class="nav-link" routerLink="/raise-ticket" routerLinkActive="active">Raise Ticket</a>
      </li>
      
      <!-- Admin Links -->
      <li class="nav-item" *ngIf="userRole === 'ADMIN'">
        <a class="nav-link" routerLink="/admin" routerLinkActive="active">Dashboard</a>
      </li>
      
      <!-- Engineer Links -->
      <li class="nav-item" *ngIf="userRole === 'ENGINEER'">
        <a class="nav-link" routerLink="/engineer" routerLinkActive="active">My Tasks</a>
      </li>
      
      <!-- Shared Links (Admin & Engineer) -->
      <li class="nav-item" *ngIf="userRole === 'ADMIN' || userRole === 'ENGINEER'">
        <a class="nav-link" routerLink="/hazards" routerLinkActive="active">Hazard Control</a>
      </li>
      
      <!-- Profile -->
      <li class="nav-item">
        <a class="nav-link" routerLink="/profile" routerLinkActive="active">Profile</a>
      </li>
    </ul>
    
    <div class="nav-actions">
      <span class="user-badge" *ngIf="currentUser">
        <span class="dot"></span>
        {{ currentUser.name }} ({{ currentUser.role }})
      </span>
      <button class="btn-logout" (click)="logout()">
        Logout
      </button>
    </div>
  </div>
</nav>
