<div class="register-wrapper flex-center">
  <div class="card register-card">
    <div class="text-center mb-4">
      <h1 class="logo-title">Join SwiftLink</h1>
      <p class="subtitle mt-1">Field Engineer Task Management Portal</p>
    </div>
    
    <div class="error-alert" *ngIf="errorMessage">
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <span>{{ successMessage }}</span>
    </div>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          class="form-control" 
          placeholder="John Doe" 
          [(ngModel)]="user.name" 
          required
          #nameInput="ngModel"
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="john@sts.com" 
          [(ngModel)]="user.email" 
          required 
          email
          #emailInput="ngModel"
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="Min 6 characters" 
          [(ngModel)]="user.password" 
          required
          minlength="6"
          #passwordInput="ngModel"
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          class="form-control" 
          placeholder="Repeat password" 
          [(ngModel)]="user.confirmPassword" 
          required
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="phone">Phone Number</label>
        <input 
          type="text" 
          id="phone" 
          name="phone" 
          class="form-control" 
          placeholder="10 digit number" 
          [(ngModel)]="user.phone" 
          required
          pattern="[0-9]{10}"
          #phoneInput="ngModel"
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="role">Register As</label>
        <select id="role" name="role" class="form-control" [(ngModel)]="user.role">
          <option value="USER">User (Raise Tickets)</option>
          <option value="ENGINEER">Field Engineer</option>
          <option value="ADMIN">Administrator</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="address">Address / Office Area</label>
        <input 
          type="text" 
          id="address" 
          name="address" 
          class="form-control" 
          placeholder="E.g., Koramangala, Bangalore" 
          [(ngModel)]="user.address" 
          required
        >
      </div>

      <!-- Security Question -->
      <div class="form-group">
        <label class="form-label" for="securityQuestion">Security Question</label>
        <select id="securityQuestion" name="securityQuestion" class="form-control" [(ngModel)]="user.securityQuestion">
          <option value="What is your pet name?">What is your pet name?</option>
          <option value="What city were you born in?">What city were you born in?</option>
          <option value="What is your favorite color?">What is your favorite color?</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="securityAnswer">Security Answer</label>
        <input 
          type="text" 
          id="securityAnswer" 
          name="securityAnswer" 
          class="form-control" 
          placeholder="Answer for recovery" 
          [(ngModel)]="user.securityAnswer" 
          required
        >
      </div>

      <!-- Engineer-Specific Fields -->
      <div class="card" *ngIf="user.role === 'ENGINEER'" style="margin-top: 1rem; border-color: var(--primary);">
        <h4 style="margin-bottom: 0.5rem;">Engineer Profile Details</h4>
        <div class="form-group">
          <label class="form-label" for="specialization">Specialization</label>
          <select id="specialization" name="specialization" class="form-control" [(ngModel)]="user.specialization">
            <option value="Fiber">Fiber Optic Cable laying</option>
            <option value="Copper">Copper fault rectifying</option>
            <option value="Installation">Service Installation</option>
            <option value="General">General Maintenance</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="homeLocation">Home Area (Bangalore)</label>
          <select id="homeLocation" name="homeLocation" class="form-control" [(ngModel)]="user.homeLocation">
            <option *ngFor="let area of bangaloreAreas" [value]="area">{{ area }}</option>
          </select>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid || isLoading" style="margin-top: 1rem;">
        <span *ngIf="!isLoading">Register Account</span>
        <span *ngIf="isLoading">Registering...</span>
      </button>
    </form>
    
    <div class="text-center mt-4">
      <p class="login-text">
        Already have an account? 
        <a routerLink="/login" class="login-link">Sign In</a>
      </p>
    </div>
  </div>
</div>
