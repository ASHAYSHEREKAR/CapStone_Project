<div class="login-wrapper flex-center">
  <div class="card login-card">
    <div class="text-center mb-4">
      <h1 class="logo-title">SwiftLink</h1>
      <p class="subtitle mt-1">Telecom Services Field Portal</p>
    </div>
    
    <div class="error-alert" *ngIf="errorMessage">
      <span>{{ errorMessage }}</span>
    </div>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="name@sts.com" 
          [(ngModel)]="credentials.email" 
          required 
          email
          #emailInput="ngModel"
        >
        <span class="field-error" *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)">
          Please enter a valid email address.
        </span>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="••••••••" 
          [(ngModel)]="credentials.password" 
          required
          #passwordInput="ngModel"
        >
        <span class="field-error" *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)">
          Password is required.
        </span>
      </div>
      
      <div class="flex-between mb-3">
        <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Signing In...</span>
      </button>
    </form>
    
    <div class="text-center mt-4">
      <p class="register-text">
        Don't have an account? 
        <a routerLink="/register" class="register-link">Register here</a>
      </p>
    </div>
  </div>
</div>
