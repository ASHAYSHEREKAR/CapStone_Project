<div class="login-wrapper flex-center">
  <div class="card login-card">
    <div class="text-center mb-4">
      <h1 class="gradient-text logo-title">SwiftLink</h1>
      <p class="subtitle mt-1">Telecom Services Field Portal</p>
    </div>
    
    <div class="error-alert" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="name@sts.com" 
          [(ngModel)]="credentials.email" 
          required 
          email
          #emailInput="ngModel"
        >
        <span class="field-error" *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)">
          Please enter a valid email address.
        </span>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="••••••••" 
          [(ngModel)]="credentials.password" 
          required
          #passwordInput="ngModel"
        >
        <span class="field-error" *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)">
          Password is required.
        </span>
      </div>
      
      <div class="flex-between mb-3">
        <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>
      
      <button type="submit" class="btn btn-accent w-100" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>
    
    <div class="text-center mt-4">
      <p class="register-text">
        Don't have an account? 
        <a routerLink="/register" class="register-link">Register here</a>
      </p>
    </div>
  </div>
</div>
