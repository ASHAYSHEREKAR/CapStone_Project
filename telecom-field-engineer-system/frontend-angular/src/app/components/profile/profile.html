<div class="profile-wrapper container">
  <div class="card profile-card">
    <h1 class="gradient-text mb-2">My Profile</h1>
    <p class="desc text-secondary mb-4">View and update your personal link details</p>

    <div class="error-alert" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/>
      </svg>
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #profileFormGroup="ngForm" *ngIf="user">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Email Address (Read-only)</label>
          <input type="text" class="form-control" [value]="user.email" readonly style="opacity: 0.7;">
        </div>
        
        <div class="form-group">
          <label class="form-label">System Role (Read-only)</label>
          <input type="text" class="form-control" [value]="user.role" readonly style="opacity: 0.7;">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            class="form-control" 
            [(ngModel)]="profileForm.name" 
            required
            #nameInput="ngModel"
          >
          <span class="field-error" *ngIf="nameInput.invalid && (nameInput.dirty || nameInput.touched)">
            Name is required.
          </span>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input 
            type="text" 
            id="phone" 
            name="phone" 
            class="form-control" 
            [(ngModel)]="profileForm.phone" 
            required
            pattern="[0-9]{10}"
            #phoneInput="ngModel"
          >
          <span class="field-error" *ngIf="phoneInput.invalid && (phoneInput.dirty || phoneInput.touched)">
            Enter a valid 10-digit phone number.
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="address">Postal Address</label>
        <input 
          type="text" 
          id="address" 
          name="address" 
          class="form-control" 
          [(ngModel)]="profileForm.address" 
          required
        >
      </div>

      <h3 class="gradient-text mt-4 mb-2">Change Password</h3>
      <p class="desc text-secondary mb-3">Leave blank if you do not want to change your password</p>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-control" 
            placeholder="Min 6 characters" 
            [(ngModel)]="profileForm.password"
            minlength="6"
            #passInput="ngModel"
          >
          <span class="field-error" *ngIf="passInput.invalid && (passInput.dirty || passInput.touched)">
            Password must be at least 6 characters.
          </span>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm New Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            class="form-control" 
            placeholder="Repeat new password" 
            [(ngModel)]="profileForm.confirmPassword"
          >
        </div>
      </div>

      <button type="submit" class="btn btn-accent mt-3" [disabled]="profileFormGroup.invalid || isLoading">
        <span *ngIf="!isLoading">Save Changes</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
