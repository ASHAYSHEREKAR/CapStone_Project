<div class="profile-wrapper container">
  <div class="card">
    <h2 class="mb-2">My Profile</h2>
    <p class="text-secondary mb-4">View and update your personal account details</p>

    <div class="error-alert" *ngIf="errorMessage">
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #profileFormGroup="ngForm" *ngIf="user">
      <div class="form-group">
        <label class="form-label">Email Address (Read-only)</label>
        <input type="text" class="form-control" [value]="user.email" readonly style="background-color: var(--bg-secondary);">
      </div>
      
      <div class="form-group">
        <label class="form-label">System Role (Read-only)</label>
        <input type="text" class="form-control" [value]="user.role" readonly style="background-color: var(--bg-secondary);">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          class="form-control" 
          [(ngModel)]="profileForm.name" 
          required
          #nameInput="ngModel"
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="phone">Phone Number</label>
        <input 
          type="text" 
          id="phone" 
          name="phone" 
          class="form-control" 
          [(ngModel)]="profileForm.phone" 
          required
          pattern="[0-9]{10}"
          #phoneInput="ngModel"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="address">Postal Address</label>
        <input 
          type="text" 
          id="address" 
          name="address" 
          class="form-control" 
          [(ngModel)]="profileForm.address" 
          required
        >
      </div>

      <h3 class="mt-4 mb-2">Change Password</h3>
      <p class="text-secondary mb-3">Leave blank if you do not want to change your password</p>

      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="Min 6 characters" 
          [(ngModel)]="profileForm.password"
          minlength="6"
          #passInput="ngModel"
        >
      </div>
      
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          class="form-control" 
          placeholder="Repeat new password" 
          [(ngModel)]="profileForm.confirmPassword"
        >
      </div>

      <button type="submit" class="btn btn-primary mt-3" [disabled]="profileFormGroup.invalid || isLoading">
        <span *ngIf="!isLoading">Save Changes</span>
        <span *ngIf="isLoading">Saving...</span>
      </button>
    </form>
  </div>
</div>
