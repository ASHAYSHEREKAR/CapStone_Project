<div class="raise-wrapper container">
  <div class="card raise-card">
    <h1 class="gradient-text mb-2">Raise Support Ticket</h1>
    <p class="desc text-secondary mb-4">Request field technician assistance or report faults</p>

    <div class="error-alert" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 960 960 960" width="20" fill="currentColor">
        <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/>
      </svg>
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #ticketForm="ngForm">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="ticketType">Service Request Type</label>
          <select id="ticketType" name="ticketType" class="form-control" [(ngModel)]="ticket.ticketType">
            <option value="FAULT">Fault Rectification (Internet/Fiber issue)</option>
            <option value="INSTALLATION">New Installation (Fiber/Broadband)</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="location">Your Area / Location (Bangalore)</label>
          <select id="location" name="location" class="form-control" [(ngModel)]="ticket.location">
            <option *ngFor="let area of bangaloreAreas" [value]="area">{{ area }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Detailed Description</label>
        <textarea 
          id="description" 
          name="description" 
          class="form-control" 
          rows="5"
          placeholder="Describe the issue or details of the installation requested. For faults, specify if router LEDs are flashing, cables are visible, or when the connection went down." 
          [(ngModel)]="ticket.description" 
          required
          #descInput="ngModel"
        ></textarea>
        <span class="field-error" *ngIf="descInput.invalid && (descInput.dirty || descInput.touched)">
          Please provide a description of the request.
        </span>
      </div>

      <p class="desc text-muted mb-4">
        * Priority is automatically assigned by the system: Fault requests are processed as HIGH priority by default.
      </p>

      <div class="flex-between gap-1">
        <a routerLink="/dashboard" class="btn btn-secondary w-50">Cancel</a>
        <button type="submit" class="btn btn-accent w-50" [disabled]="ticketForm.invalid || isLoading">
          <span *ngIf="!isLoading">Submit Request</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </div>
    </form>
  </div>
</div>
