<div class="container" style="max-width: 600px;">
  <div class="card">
    <h2>Raise Support Ticket</h2>
    <p class="text-secondary mb-4">Submit a new installation request or report a line fault</p>
    
    <div class="error-alert" *ngIf="errorMessage">
      <span>{{ errorMessage }}</span>
    </div>
    
    <div class="success-alert" *ngIf="successMessage">
      <span>{{ successMessage }}</span>
    </div>
    
    <form (ngSubmit)="onSubmit()" #ticketForm="ngForm">
      <div class="form-group">
        <label class="form-label" for="ticketType">Service Request Type</label>
        <select id="ticketType" name="ticketType" class="form-control" [(ngModel)]="ticket.ticketType">
          <option value="FAULT">Line Fault Rectification</option>
          <option value="INSTALLATION">New Service Installation</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="location">Location / Area (Bangalore)</label>
        <select id="location" name="location" class="form-control" [(ngModel)]="ticket.location">
          <option *ngFor="let area of bangaloreAreas" [value]="area">{{ area }}</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="description">Fault / Installation Description</label>
        <textarea 
          id="description" 
          name="description" 
          class="form-control" 
          rows="5" 
          placeholder="Describe your telecom issue or installation requirements in detail..." 
          [(ngModel)]="ticket.description"
          required
        ></textarea>
      </div>
      
      <div class="flex-between mt-4">
        <a routerLink="/dashboard" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" [disabled]="ticketForm.invalid || isLoading">
          <span *ngIf="!isLoading">Submit Ticket</span>
          <span *ngIf="isLoading">Submitting...</span>
        </button>
      </div>
    </form>
  </div>
</div>
